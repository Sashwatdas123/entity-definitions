connectionState:
  title: Connection State
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.fastconnect.connection.state`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bitRateReceived:
  title: Bit Rate Received
  unit: BITS_PER_SECOND
  queries:
    oci:
      select: average(`oci.fastconnect.bit.rate.received`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bitRateSent:
  title: Bit Rate Sent
  unit: BITS_PER_SECOND
  queries:
    oci:
      select: average(`oci.fastconnect.bit.rate.sent`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
packetsError:
  title: Packets with Errors
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.fastconnect.packets.error`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

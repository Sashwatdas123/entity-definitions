domain: EXT
type: NETWORK_DEVICE
synthesis:
  rules:
  - ruleName: ext_network_device_from_networktopology_event
    identifier: deviceName
    name: deviceName
    encodeIdentifierInGUID: true
    conditions:
    - attribute: eventType
      value: NetworkTopology
    - attribute: networkEntityType
      value: NETWORK_DEVICE
    - attribute: deviceName
      present: true
    tags:
      deviceName:
        entityTagName: hostname
      observedMac:
        entityTagName: mac
      managementIp:
        entityTagName: managementIp
      source:
        entityTagName: source
      serial:
        entityTagName: serial
      vendor:
        entityTagName: vendor
      model:
        entityTagName: model
      isStack:
        entityTagName: isStack
      stackType:
        entityTagName: stackType
      stackMemberCount:
        entityTagName: stackMemberCount
      stackMemberMac:
        entityTagName: stackMemberMac
        multiValue: true
      stackMemberSerial:
        entityTagName: stackMemberSerial
        multiValue: true
      stackMemberRole:
        entityTagName: stackMemberRole
        multiValue: true
      stackMemberModel:
        entityTagName: stackMemberModel
        multiValue: true

goldenTags:
- vendor
- model

ownership:
  primaryOwner:
    teamName: "Network Monitoring"

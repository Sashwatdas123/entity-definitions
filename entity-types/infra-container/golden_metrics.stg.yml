cpuUsage:
  title: CPU usage (cores)
  queries:
    newRelic:
      select: max(docker.container.cpuUsedCores) or max(k8s.container.cpuUsedCores) as 'CPU used cores'
    opentelemetry:
      # via KubeletStats Receiver
      select: max(container.cpu.usage) AS 'CPU used cores'
cpuUtilization:
  title: CPU utilization (%)
  unit: PERCENTAGE
  queries:
    newRelic:
      select: max(docker.container.cpuPercent) or max(k8s.container.cpuCoresUtilization) AS 'CPU Utilization (%)'
    opentelemetry:
      # via KubeletStats Receiver which has values 0-1 & awsecscontainermetricsreceiver which has values 0-100
      select: max(k8s.container.cpu_limit_utilization * 100 or container.cpu.utilized) AS 'CPU Utilization (%)'
memoryUsage:
  title: Memory usage (bytes)
  unit: BYTES
  queries:
    newRelic:
      select: max(docker.container.memoryUsageBytes) or max(docker.container.memoryPrivateWorkingSet) or max(k8s.container.memoryWorkingSetBytes) AS 'Memory used (bytes)'
    opentelemetry:
      # via dockerstatsreceiver OR kubeletstatsreceiver OR awsecscontainermetricsreceiver respectively
      select: max(container.memory.usage.total) or max(container.memory.usage) or max(container.memory.usage) or max(container.memory.usage.max) or max(container.memory.utilized) AS 'Memory used (bytes)'
storageUsage:
  title: Storage usage (bytes)
  unit: BYTES
  queries:
    newRelic:
      select: max(docker.container.ioTotalBytes) or max(k8s.container.fsUsedPercent) AS 'Storage used (bytes)'
    opentelemetry:
      # via dockerstatsreceiver OR kubeletstatsreceiver OR awsecscontainermetricsreceiver respectively
      select: max(container.blockio.io_service_bytes_recursive) or max(container.filesystem.usage) or (max(container.storage.write_bytes) + max(container.storage.read_bytes)) AS 'Storage used (bytes)'
networkTrafficTotal:
  title: Network traffic (bytes per second)
  unit: BYTES_PER_SECOND
  queries:
    newRelic:
      select: max(docker.container.networkRxBytesPerSecond) + max(docker.container.networkTxBytesPerSecond) AS 'Network traffic (bytes per second)'
    # defaulting to newRelic query for now since we cannot match value functions for OpenTelemetry cumulative metrics.
    opentelemetry:
      select: rate(max(container.storage.write_bytes), 1 second) + rate(max(container.storage.read_bytes), 1 second) AS 'Network traffic (bytes per second)'

      - domain: EXT
        type: SWITCH
      - domain: EXT
        type: ROUTER
      - domain: EXT
        type: ACCESS_POINT
      - domain: EXT
        type: NETWORK_DEVICE
    tags:
      matchingMode: FIRST
      predicates:

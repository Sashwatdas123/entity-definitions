relationships:
  - name: extPortConnectsToPort
    version: "1"
    origins: [Event API]
    conditions:
      - { attribute: eventType,   anyOf: ["NetworkTopology"] }
      - { attribute: deviceName,  present: true }
      - { attribute: port,        present: true }
      - { attribute: dstPort,     present: true }
      - { attribute: dstName,     present: true }
    relationship:
      expires: PT75M
      relationshipType: CONNECTS_TO
      source:
        buildGuid:
          account: { attribute: accountId }
          domain:  { value: EXT }
          type:    { value: PORT }
          identifier:
            fragments: [ { attribute: deviceName }, { value: ":" }, { attribute: port } ]
            hashAlgorithm: FARM_HASH
      target:
        lookupGuid:
          candidateCategory: NETWORK_PORT
          fields:
            - { field: deviceMac,          attribute: dstMac }
            - { field: deviceManagementIp, attribute: dstIp }
            - { field: deviceHostname,     attribute: dstName }
            - { field: port,               attribute: dstPort }

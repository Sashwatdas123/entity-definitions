relationships:
  - name: extSwitchContainsPort
    version: "1"
    origins: [Event API]
    conditions:
      - { attribute: eventType,         anyOf: ["NetworkTopology"] }
      - { attribute: networkEntityType, anyOf: ["SWITCH"] }
      - { attribute: deviceName,        present: true }
      - { attribute: port,              present: true }
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        buildGuid:
          account: { attribute: accountId }
          domain:  { value: EXT }
          type:    { value: SWITCH }
          identifier:
            fragments: [ { attribute: deviceName } ]
            hashAlgorithm: FARM_HASH
      target:
        buildGuid:
          account: { attribute: accountId }
          domain:  { value: EXT }
          type:    { value: PORT }
          identifier:
            fragments: [ { attribute: deviceName }, { value: ":" }, { attribute: port } ]
            hashAlgorithm: FARM_HASH


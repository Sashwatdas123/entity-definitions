relationships:
  - name: extServiceCallsAzureSqlDatabase
    version: "1"
    entitlements:
      matching: anyOf
      values:
        - auto_discovery_entities_ccu
        - auto_discovery_entities_ccu_discount_usage
        - azure_auto_discovery
        - azure_auto_discovery_discount_usage
    origins:
      - Distributed Tracing
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Span" ]
      - attribute: entity.type
        anyOf: [ "SERVICE" ]
      - attribute: db.system.name
        anyOf: [ "microsoft.sql_server" ]
      - attribute: db.namespace
        present: true
      - attribute: server.address
        regex: '^(?:tcp:)?([a-zA-Z0-9\-]+(?:\.secondary)?\.database\.windows\.net)$'
    relationship:
      expires: PT75M
      relationshipType: CALLS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: AZURESQLDATABASE
          fields:
            - field: endpoint
              capture:
                attribute: server.address
                regex: '^(?:tcp:)?([a-zA-Z0-9\-]+)(?:\.secondary)?\.database\.windows\.net$'
            - field: dbname
              attribute: db.namespace
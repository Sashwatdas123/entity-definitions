# HOST MEASURES IBMMQ_MANAGER (OpenTelemetry; source HOST GUID from host.id).
relationships:
  - name: hostMeasuresOTelIbmMqManager
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: entity.type
        anyOf: [ "IBMMQ_MANAGER" ]
      - attribute: host.id
        present: true
      - attribute: k8s.pod.name # exclude k8s pod-based hosts
        present: false
    relationship:
      expires: PT75M
      relationshipType: MEASURES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: host.id
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: IBMMQ_MANAGER
